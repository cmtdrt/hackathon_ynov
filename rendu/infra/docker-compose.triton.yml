# Bonus INFRA — Triton Inference Server
services:
  triton:
    build:
      context: ../..
      dockerfile: tritton_server/Dockerfile
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ../../model_repository:/models
    command: tritonserver --model-repository=/models --log-verbose=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
